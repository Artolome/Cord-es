<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Émargement – Cordées de la Réussite</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f1b2d;
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
      color: #e2e8f0;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 35% 70%, rgba(255,255,255,0.6) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 1.6rem; }
    .header .badge {
      display: inline-block;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white; font-family: 'Baloo 2', sans-serif; font-size: 0.8rem;
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.3rem 1rem; border-radius: 999px; margin-bottom: 0.8rem;
    }
    .header h1 {
      font-family: 'Baloo 2', sans-serif; font-weight: 800;
      font-size: clamp(1.7rem, 5vw, 2.4rem); color: #fff; line-height: 1.1;
    }
    .header .sub { color: #94a3b8; margin-top: 0.4rem; font-size: 0.95rem; }
    .wave { font-size: 2.8rem; display: block; margin-bottom: 0.3rem; }

    /* Stat bar */
    .statbar {
      display: flex; gap: 0.8rem; justify-content: center;
      margin-bottom: 1.4rem; flex-wrap: wrap;
    }
    .stat {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 0.6rem 1.2rem; text-align: center; min-width: 110px;
    }
    .stat .num {
      font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 1.6rem; line-height: 1;
    }
    .stat .lbl { font-size: 0.72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }
    .stat.present .num { color: #4ade80; }
    .stat.absent .num { color: #fb923c; }
    .stat.total .num { color: #38bdf8; }

    /* Controls */
    .controls { display: flex; gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .controls input {
      flex: 1; min-width: 160px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 0.7rem 1rem; color: #fff; font-family: inherit; font-size: 0.95rem;
    }
    .controls input::placeholder { color: #64748b; }
    .controls input:focus { outline: 2px solid #38bdf8; outline-offset: 1px; }
    .btn {
      font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 0.9rem;
      border: none; border-radius: 12px; padding: 0.7rem 1.1rem; cursor: pointer;
      color: white; transition: filter 0.15s, transform 0.1s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { transform: scale(0.97); }
    .btn-add { background: linear-gradient(135deg, #38bdf8, #0ea5e9); }
    .btn-ghost { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }

    .toolbar { display: flex; gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .toolbar .btn { flex: 1; min-width: 130px; }
    .btn-csv { background: linear-gradient(135deg, #34d399, #059669); }
    .btn-print { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .btn-reset { background: linear-gradient(135deg, #f87171, #dc2626); }

    /* List */
    .list { display: flex; flex-direction: column; gap: 0.6rem; }
    .row {
      display: flex; align-items: center; gap: 0.9rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 0.8rem 1rem; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .row:hover { background: rgba(255,255,255,0.08); }
    .row:active { transform: scale(0.99); }
    .row.present {
      background: rgba(74,222,128,0.12);
      border-color: rgba(74,222,128,0.4);
    }
    .check {
      width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: all 0.15s;
    }
    .row.present .check {
      background: #22c55e; border-color: #22c55e; color: white;
    }
    .name { flex: 1; font-weight: 700; font-size: 1.02rem; color: #f1f5f9; }
    .row.present .name { color: #bbf7d0; }
    .time { font-size: 0.78rem; color: #4ade80; font-weight: 700; min-width: 52px; text-align: right; }
    .del {
      background: none; border: none; color: #64748b; cursor: pointer;
      font-size: 1.2rem; padding: 0 0.3rem; line-height: 1; flex-shrink: 0;
    }
    .del:hover { color: #f87171; }

    .empty {
      text-align: center; color: #64748b; padding: 2.5rem 1rem;
      border: 2px dashed rgba(255,255,255,0.12); border-radius: 16px;
    }
    .empty .big { font-size: 2.4rem; display: block; margin-bottom: 0.5rem; }

    .hint { text-align: center; color: #64748b; font-size: 0.82rem; margin-top: 1.4rem; }
    .back { display: inline-block; margin-top: 0.4rem; color: #38bdf8; text-decoration: none; font-weight: 700; }
    .back:hover { text-decoration: underline; }

    @media print {
      body { background: white; color: #1e293b; }
      body::before, .controls, .toolbar, .del, .hint { display: none; }
      .row, .stat { border-color: #cbd5e1; background: #f8fafc; }
      .name, .header h1 { color: #1e293b; }
      .row.present { background: #dcfce7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <span class="wave">👋</span>
      <div class="badge">Accueil des élèves</div>
      <h1>Feuille d'émargement</h1>
      <p class="sub">Clique sur ton nom pour signaler ta présence</p>
    </header>

    <div class="statbar">
      <div class="stat present"><div class="num" id="nPresent">0</div><div class="lbl">Présents</div></div>
      <div class="stat absent"><div class="num" id="nAbsent">0</div><div class="lbl">Attendus</div></div>
      <div class="stat total"><div class="num" id="nTotal">0</div><div class="lbl">Total</div></div>
    </div>

    <div class="controls">
      <input type="text" id="newName" placeholder="Ajouter un élève (Prénom Nom)…" autocomplete="off" />
      <button class="btn btn-add" id="addBtn">+ Ajouter</button>
    </div>

    <div class="toolbar">
      <button class="btn btn-csv" id="csvBtn">⬇ Exporter (CSV)</button>
      <button class="btn btn-print" id="printBtn">🖨 Imprimer</button>
      <button class="btn btn-reset" id="resetBtn">↺ Réinitialiser présences</button>
    </div>

    <div class="list" id="list"></div>

    <p class="hint">
      Les présences sont enregistrées automatiquement sur cet ordinateur.<br>
      <a class="back" href="programme-cordees-finale.html">← Retour au programme</a>
    </p>
  </div>

  <script>
// Remplacez les guillemets ci-dessous par votre URL Google Apps Script
const SCRIPT_URL_EMARGEMENT = "https://script.google.com/macros/s/AKfycbxqm32KzJgNo6lqussRG0GitJItQ1F99zIXlnnFe5s/dev";

// Cette fonction s'exécute quand l'élève valide son émargement
function envoyerEmargementGoogleSheet(nomDeLeleve) {
  fetch(`${SCRIPT_URL_EMARGEMENT}?formType=emargement&nomPrenom=${encodeURIComponent(nomDeLeleve)}`, {
    method: 'POST'
  })
  .then(res => res.json())
  .then(data => console.log("Émargement envoyé avec succès !"))
  .catch(err => console.error("Erreur d'envoi de l'émargement", err));
}
    const STORAGE_KEY = 'cordees_emargement_v1';

    // Liste de départ — modifie / ajoute / supprime librement
    const DEFAULT_STUDENTS = [
      "Élève 1", "Élève 2", "Élève 3", "Élève 4", "Élève 5",
      "Élève 6", "Élève 7", "Élève 8", "Élève 9", "Élève 10"
    ];

    let students = load();

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return DEFAULT_STUDENTS.map((n, i) => ({ id: 'd' + i, name: n, present: false, time: null }));
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(students)); } catch (e) {}
    }

    function nowHM() {
      const d = new Date();
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function toggle(id) {
      const s = students.find(x => x.id === id);
      if (!s) return;
      s.present = !s.present;
      s.time = s.present ? nowHM() : null;
      save(); render();
    }

    function addStudent() {
      const input = document.getElementById('newName');
      const name = input.value.trim();
      if (!name) return;
      students.push({ id: 'u' + Date.now(), name, present: false, time: null });
      input.value = '';
      save(); render(); input.focus();
    }

    function removeStudent(id, ev) {
      ev.stopPropagation();
      students = students.filter(x => x.id !== id);
      save(); render();
    }

    function resetPresences() {
      if (!confirm('Remettre toutes les présences à zéro ? (la liste des élèves est conservée)')) return;
      students.forEach(s => { s.present = false; s.time = null; });
      save(); render();
    }

    function exportCSV() {
      const lines = [['Nom', 'Présence', 'Heure']];
      students.forEach(s => lines.push([s.name, s.present ? 'Présent' : 'Absent', s.time || '']));
      const csv = lines.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(';')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'emargement-cordees-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function render() {
      const list = document.getElementById('list');
      const present = students.filter(s => s.present).length;
      document.getElementById('nPresent').textContent = present;
      document.getElementById('nAbsent').textContent = students.length - present;
      document.getElementById('nTotal').textContent = students.length;

      if (students.length === 0) {
        list.innerHTML = '<div class="empty"><span class="big">🗒️</span>Aucun élève dans la liste.<br>Ajoute des noms avec le champ ci-dessus.</div>';
        return;
      }

      list.innerHTML = '';
      students.forEach(s => {
        const row = document.createElement('div');
        row.className = 'row' + (s.present ? ' present' : '');
        row.onclick = () => toggle(s.id);
        row.innerHTML =
          '<div class="check">' + (s.present ? '✓' : '') + '</div>' +
          '<div class="name"></div>' +
          (s.present ? '<div class="time">' + s.time + '</div>' : '') +
          '<button class="del" title="Supprimer">×</button>';
        row.querySelector('.name').textContent = s.name;
        row.querySelector('.del').onclick = (ev) => removeStudent(s.id, ev);
        list.appendChild(row);
      });
    }

    document.getElementById('addBtn').onclick = addStudent;
    document.getElementById('newName').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(); });
    document.getElementById('csvBtn').onclick = exportCSV;
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('resetBtn').onclick = resetPresences;

    render();
  </script>
</body>
</html>

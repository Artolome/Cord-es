<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordées de la Réussite - Suivi Pièces d'Identité</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #4b5563;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label.main-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .checklist-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            cursor: pointer;
            user-select: none;
        }

        .check-item:last-child {
            margin-bottom: 0;
        }

        .check-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .check-text h4 {
            margin: 0;
            font-size: 1rem;
            color: var(--text);
        }

        .check-text p {
            margin: 2px 0 0 0;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .status-success {
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status-error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cordées de la Réussite</h1>
        <p class="subtitle">Mise à jour de votre dossier de voyage</p>

        <form id="idChecklistForm">
            <!-- Champ Nom / Prénom -->
            <div class="form-group">
                <label class="main-label" for="nomPrenom">Nom et Prénom de l'élève :</label>
                <input type="text" id="nomPrenom" name="nomPrenom" placeholder="Ex: Elodie MARTIN" required>
            </div>

            <!-- Check-list -->
            <div class="form-group">
                <label class="main-label">Cochez les cases correspondant à votre situation actuelle :</label>
                <div class="checklist-card">
                    
                    <label class="check-item">
                        <input type="checkbox" name="cniEnCours" value="Oui">
                        <div class="check-text">
                            <h4>Carte Nationale d'Identité (CNI) — En cours</h4>
                            <p>Le dossier est déposé en mairie, j'attends le rendez-vous ou la fabrication.</p>
                        </div>
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="cniRecue" value="Oui">
                        <div class="check-text">
                            <h4>Carte Nationale d'Identité (CNI) — Reçue</h4>
                            <p>J'ai ma carte d'identité valide avec moi à la maison.</p>
                        </div>
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="passportEnCours" value="Oui">
                        <div class="check-text">
                            <h4>Passeport — En cours</h4>
                            <p>La demande de passeport est lancée en mairie.</p>
                        </div>
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="passportRecu" value="Oui">
                        <div class="check-text">
                            <h4>Passeport — Reçu</h4>
                            <p>J'ai mon passeport valide à la maison.</p>
                        </div>
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="ast" value="Oui">
                        <div class="check-text">
                            <h4>Autorisation de Sortie du Territoire (AST)</h4>
                            <p>Le formulaire Cerfa est signé par mes parents et j'ai la copie de leur pièce d'identité.</p>
                        </div>
                    </label>

                </div>
            </div>

            <button type="submit" id="submitBtn">Enregistrer mes réponses</button>
        </form>

        <div id="status" class="status-message"></div>
    </div>

    <script>
        // METTEZ VOTRE URL DE DEPLOIEMENT GOOGLE APPS SCRIPT ENTRE LES GUILLEMETS CI-DESSOUS
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7jSiYjanb_-IlAkf9NOfohwNmgJ45fNlLWclY9E_6Lqd_Y7_QF3g3GtrjALNdcQsO/exec";

        document.getElementById('idChecklistForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            // Verrouille le bouton pendant l'envoi
            submitBtn.disabled = true;
            submitBtn.innerText = "Envoi en cours...";
            
            // Masque l'ancien statut s'il y en a un
            statusDiv.style.display = 'none';
            statusDiv.className = 'status-message';

            // Collecte les données du formulaire
            const formData = new FormData(this);
            
            // Transformation en paramètres URL pour le script Google
            const queryString = new URLSearchParams(formData).toString();

            // Envoi des données via l'API Fetch
            fetch(`${SCRIPT_URL}?${queryString}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === 'success') {
                    statusDiv.innerText = "✓ Tes réponses ont bien été enregistrées ! Merci.";
                    statusDiv.classList.add('status-success');
                    statusDiv.style.display = 'block';
                    // Réinitialise le formulaire
                    document.getElementById('idChecklistForm').reset();
                } else {
                    throw new Error('Erreur lors de la sauvegarde');
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                statusDiv.innerText = "✕ Une erreur est survenue lors de l'envoi. Réessaye ou préviens ton professeur.";
                statusDiv.classList.add('status-error');
                statusDiv.style.display = 'block';
            })
            .finally(() => {
                // Déverrouille le bouton
                submitBtn.disabled = false;
                submitBtn.innerText = "Enregistrer mes réponses";
            });
        });
    </script>
</body>
</html>

<!-- Questionnaire de satisfaction — Les Cordées de la réussite -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Les Cordées de la réussite — ton avis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#1E4D3B;
    --forest-deep:#14352A;
    --sand:#F7F0E1;
    --paper:#FFFDF7;
    --bark:#2B2118;
    --gold:#E0A12E;
    --gold-soft:#F4D79A;
    --teal:#1F9E8C;
    --coral:#E76F51;
    --muted:#8A7E6B;
    --line:#E7DCC4;
    --shadow:0 18px 40px -22px rgba(20,53,42,.5);
    --r:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Plus Jakarta Sans",system-ui,sans-serif;
    color:var(--bark);
    background:
      radial-gradient(120% 80% at 50% -10%, #2a6b52 0%, var(--forest) 38%, var(--forest-deep) 100%) fixed;
    min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;
    padding:clamp(14px,3vw,40px) 14px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:680px}

  /* ---------- Rope progress (signature) ---------- */
  .rope{
    display:flex;align-items:center;gap:0;
    margin:0 auto 18px;max-width:560px;padding:0 6px;
  }
  .rope .seg{flex:1;height:4px;border-radius:4px;
    background:repeating-linear-gradient(90deg,var(--gold-soft) 0 6px, #d9bd7e 6px 10px);
    opacity:.32;transition:opacity .4s}
  .rope .seg.on{opacity:.95}
  .knot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;
    background:var(--forest-deep);border:2px solid var(--gold-soft);
    transform:scale(.78);transition:transform .35s cubic-bezier(.34,1.56,.64,1),background .35s,box-shadow .35s}
  .knot.done{background:var(--gold);border-color:#fff7e6;transform:scale(1);box-shadow:0 0 0 4px rgba(224,161,46,.25)}
  .knot.current{background:var(--teal);border-color:#eafff9;transform:scale(1.12);box-shadow:0 0 0 5px rgba(31,158,140,.28)}

  /* ---------- Card ---------- */
  .card{
    background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.5);
    padding:clamp(22px,4.5vw,38px);
    position:relative;overflow:hidden;
  }
  .eyebrow{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--teal);font-weight:700;margin:0 0 6px}
  h1{font-family:"Fraunces",serif;font-weight:600;line-height:1.05;
    font-size:clamp(1.7rem,5.4vw,2.5rem);margin:0 0 8px;color:var(--forest-deep);letter-spacing:-.01em}
  h2{font-family:"Fraunces",serif;font-weight:600;line-height:1.08;
    font-size:clamp(1.35rem,4.6vw,1.95rem);margin:.1em 0 4px;color:var(--forest-deep);letter-spacing:-.01em}
  .lead{color:var(--muted);font-size:1.02rem;line-height:1.5;margin:0 0 4px}
  .hint{color:var(--gold);font-weight:600;font-size:.92rem;margin:2px 0 0}

  .step{display:none;animation:rise .45s ease both}
  .step.active{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .q{margin-top:22px}
  .q-label{font-weight:600;font-size:1.04rem;line-height:1.4;margin:0 0 12px;color:var(--bark)}

  /* emoji scale */
  .faces{display:flex;gap:8px;flex-wrap:wrap}
  .face{flex:1 1 0;min-width:58px;border:1.5px solid var(--line);background:#fff;
    border-radius:14px;padding:12px 4px 9px;cursor:pointer;text-align:center;
    transition:transform .15s,border-color .2s,background .2s,box-shadow .2s;font-family:inherit}
  .face:hover{transform:translateY(-3px);border-color:var(--gold-soft)}
  .face .emo{font-size:1.7rem;line-height:1;display:block}
  .face .cap{display:block;font-size:.68rem;color:var(--muted);margin-top:6px;font-weight:600}
  .face.sel{border-color:var(--teal);background:#effaf7;box-shadow:0 0 0 3px rgba(31,158,140,.18)}
  .face.sel .cap{color:var(--teal)}
  .face:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

  /* choice pills */
  .pills{display:flex;gap:10px;flex-wrap:wrap}
  .pill{border:1.5px solid var(--line);background:#fff;border-radius:999px;
    padding:11px 18px;cursor:pointer;font-weight:600;font-size:.96rem;color:var(--bark);
    transition:.18s;font-family:inherit}
  .pill:hover{border-color:var(--gold-soft)}
  .pill.sel{background:var(--forest);border-color:var(--forest);color:#fff}
  .pill:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

  /* inputs */
  label.field{display:block;margin-bottom:18px}
  .field-label{font-weight:600;font-size:1rem;margin-bottom:8px;display:block}
  .opt{color:var(--muted);font-weight:500;font-size:.85rem}
  input[type=text],select,textarea{
    width:100%;border:1.5px solid var(--line);border-radius:12px;background:#fff;
    padding:12px 14px;font:inherit;color:var(--bark);transition:border-color .2s,box-shadow .2s}
  textarea{min-height:84px;resize:vertical;line-height:1.5}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(31,158,140,.16)}

  /* nav */
  .nav{display:flex;gap:12px;align-items:center;margin-top:30px}
  .btn{font-family:inherit;font-weight:700;font-size:1rem;border-radius:999px;
    padding:13px 26px;cursor:pointer;border:0;transition:transform .15s,filter .2s,box-shadow .2s}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
  .btn-primary{background:var(--gold);color:#3a2a08;box-shadow:0 10px 24px -12px rgba(224,161,46,.9)}
  .btn-primary:hover{transform:translateY(-2px);filter:brightness(1.03)}
  .btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line)}
  .btn-ghost:hover{color:var(--bark);border-color:var(--muted)}
  .spacer{flex:1}
  .count{color:var(--muted);font-size:.85rem;font-weight:600}

  /* welcome / thanks hero */
  .hero-badge{display:inline-flex;align-items:center;gap:8px;background:#effaf7;color:var(--teal);
    font-weight:700;font-size:.78rem;letter-spacing:.05em;border-radius:999px;padding:7px 14px;margin-bottom:16px;text-transform:uppercase}
  .big{font-size:3rem;line-height:1;margin:6px 0 14px}
  .center{text-align:center}

  /* footer */
  .foot{text-align:center;margin-top:16px}
  .linklike{background:none;border:0;color:var(--gold-soft);font:inherit;font-size:.82rem;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;opacity:.85}
  .linklike:hover{opacity:1}

  /* teacher dashboard */
  #dash{display:none}
  #dash.active{display:block}
  .dash-card{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);padding:clamp(20px,4vw,34px)}
  .stat-row{display:flex;align-items:center;gap:12px;margin:14px 0}
  .stat-row .lab{flex:1;font-weight:600;font-size:.95rem}
  .bar{flex:1.4;height:10px;border-radius:6px;background:var(--line);overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:6px}
  .val{width:64px;text-align:right;font-weight:700;color:var(--forest);font-size:.9rem}
  .dist{display:flex;gap:6px;flex:1.4;flex-wrap:wrap}
  .chip{background:#f1ece0;border-radius:8px;padding:4px 10px;font-size:.82rem;font-weight:600;color:var(--bark)}
  .block-title{font-family:"Fraunces",serif;font-size:1.15rem;color:var(--forest-deep);margin:26px 0 6px;border-top:1px solid var(--line);padding-top:18px}
  .quote{background:#faf4e6;border-left:3px solid var(--gold);border-radius:0 10px 10px 0;
    padding:10px 14px;margin:8px 0;font-size:.95rem;line-height:1.5}
  .quote .meta{display:block;color:var(--muted);font-size:.76rem;font-weight:600;margin-top:4px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .empty{color:var(--muted);text-align:center;padding:30px 0}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="wrap">

  <!-- ===================== QUESTIONNAIRE ===================== -->
  <div id="survey">
    <div class="rope" id="rope" aria-hidden="true"></div>
    <div class="card">
      <div id="steps"></div>
      <div class="nav" id="nav"></div>
    </div>
    <div class="foot">
      <button class="linklike" id="teacherLink">Espace enseignant</button>
    </div>
  </div>

  <!-- ===================== DASHBOARD ===================== -->
  <div id="dash">
    <div class="dash-card">
      <p class="eyebrow">Espace enseignant</p>
      <h2 style="margin-top:0">Synthèse des réponses</h2>
      <div id="dashBody"><p class="empty">Chargement…</p></div>
      <div class="toolbar">
        <button class="btn btn-ghost" id="reloadBtn">Actualiser</button>
        <button class="btn btn-ghost" id="csvBtn">Exporter (CSV)</button>
        <button class="btn btn-ghost" id="backBtn">Retour au questionnaire</button>
      </div>
    </div>
  </div>

</div>

<script>
const FACES = [
  {v:1, e:'😞', c:'Pas top'},
  {v:2, e:'😕', c:'Bof'},
  {v:3, e:'🙂', c:'Bien'},
  {v:4, e:'😄', c:'Super'},
  {v:5, e:'🤩', c:'Au top !'},
];

// --- mot de passe simple de l'espace enseignant (modifiable) ---
const TEACHER_CODE = "cordee2026";

const STEPS = [
  {id:'welcome'},
  {id:'identity', eyebrow:'Pour commencer', title:'Fais-toi connaître', lead:'Deux infos rapides, puis on parle des Cordées.',
   questions:[
     {key:'classe', type:'select', label:'Ta classe', options:['6e','5e','4e','3e','Autre']},
     {key:'prenom', type:'shorttext', label:'Ton prénom', opt:true, placeholder:'Tu peux rester anonyme'},
   ]},
  {id:'general', eyebrow:'Vue d’ensemble', title:'Ton année de Cordée',
   questions:[
     {key:'global', type:'emoji', label:'Globalement, comment s’est passée ton année avec les Cordées ?'},
     {key:'reco', type:'choice', label:'Conseillerais-tu les Cordées à d’autres élèves ?', options:['Oui, à fond','Peut-être','Non']},
   ]},
  {id:'pros', eyebrow:'Rencontres', title:'Les professionnels rencontrés', hint:'Avocat · infirmier · médecin…',
   questions:[
     {key:'pros_like', type:'emoji', label:'As-tu aimé rencontrer ces professionnels ?'},
     {key:'pros_metiers', type:'choice', label:'Est-ce que ça t’a fait découvrir des métiers ?', options:['Beaucoup','Un peu','Pas vraiment']},
   ]},
  {id:'ateliers', eyebrow:'Ateliers', title:'CV et recherche de métier',
   questions:[
     {key:'cv', type:'emoji', label:'L’atelier pour créer ton CV'},
     {key:'recherche', type:'emoji', label:'La recherche d’un métier et d’une formation'},
   ]},
  {id:'imp', eyebrow:'Atelier', title:'L’imprimante 3D',
   questions:[
     {key:'imp3d', type:'emoji', label:'Les ateliers imprimante 3D et la fabrication de ton objet'},
     {key:'imp_text', type:'text', label:'Qu’as-tu fabriqué ? Raconte en quelques mots', opt:true, placeholder:'Mon objet, ce que j’en ai pensé…'},
   ]},
  {id:'cayenne', eyebrow:'La sortie d’une semaine', title:'La semaine à Cayenne', hint:'Note chaque visite',
   questions:[
     {key:'solam', type:'emoji', label:'L’usine Solam (yaourts…)'},
     {key:'archives', type:'emoji', label:'Les Archives de Guyane'},
     {key:'univ', type:'emoji', label:'L’Université de Guyane'},
     {key:'entreprises', type:'emoji', label:'Les rencontres avec les entreprises'},
     {key:'cayenne_souvenir', type:'text', label:'Ton meilleur souvenir de la semaine ?', opt:true, placeholder:'Ce que tu retiens…'},
   ]},
  {id:'futur', eyebrow:'Et maintenant', title:'Et toi, dans tout ça ?',
   questions:[
     {key:'orientation', type:'choice', label:'Les Cordées t’ont-elles donné des idées pour ton avenir ?', options:['Oui, plein','Un peu','Pas encore']},
     {key:'prefere', type:'text', label:'L’activité que tu as préférée cette année ?', opt:true, placeholder:'Mon coup de cœur…'},
     {key:'change', type:'text', label:'Quelque chose que tu changerais ou qui t’a manqué ?', opt:true, placeholder:'Tes idées pour l’an prochain…'},
     {key:'mot', type:'shorttext', label:'Un mot ou une phrase pour résumer ton année de Cordée', opt:true, placeholder:'Ex. : « inoubliable ! »'},
   ]},
  {id:'thanks'},
];

// metadata for dashboard
const EMOJI_QS = [
  ['global','Impression générale'],['pros_like','Rencontres pros'],
  ['cv','Atelier CV'],['recherche','Recherche de métier'],['imp3d','Imprimante 3D'],
  ['solam','Usine Solam'],['archives','Archives de Guyane'],['univ','Université de Guyane'],
  ['entreprises','Rencontres entreprises'],
];
const CHOICE_QS = [['reco','Recommanderait'],['pros_metiers','Découverte de métiers'],['orientation','Idées d’avenir']];
const TEXT_QS = [['imp_text','Objet imprimé'],['cayenne_souvenir','Souvenir de Cayenne'],['prefere','Activité préférée'],['change','À améliorer'],['mot','En un mot']];
const ALL_KEYS = ['classe','prenom',...EMOJI_QS.map(x=>x[0]),...CHOICE_QS.map(x=>x[0]),...TEXT_QS.map(x=>x[0])];

const answers = {};
let cur = 0;
const contentSteps = STEPS.length - 2; // identity..futur counted for rope

/* ---------- rope ---------- */
function buildRope(){
  const rope = document.getElementById('rope');
  rope.innerHTML = '';
  for(let i=1;i<=contentSteps;i++){
    const k = document.createElement('div'); k.className='knot'; k.dataset.i=i;
    rope.appendChild(k);
    if(i<contentSteps){ const s=document.createElement('div'); s.className='seg'; s.dataset.i=i; rope.appendChild(s); }
  }
}
function paintRope(){
  document.querySelectorAll('.knot').forEach(k=>{
    const i=+k.dataset.i; k.classList.remove('done','current');
    if(i<cur) k.classList.add('done');
    else if(i===cur) k.classList.add('current');
  });
  document.querySelectorAll('.seg').forEach(s=>{ s.classList.toggle('on', +s.dataset.i < cur); });
}

/* ---------- render ---------- */
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

function renderQuestion(q){
  const wrap = el('div','q');
  if(q.type==='emoji'){
    wrap.appendChild(el('p','q-label',q.label));
    const row = el('div','faces');
    FACES.forEach(f=>{
      const b = el('button','face'); b.type='button';
      b.setAttribute('aria-label',f.c);
      b.innerHTML=`<span class="emo">${f.e}</span><span class="cap">${f.c}</span>`;
      if(answers[q.key]===f.v) b.classList.add('sel');
      b.onclick=()=>{answers[q.key]=f.v; row.querySelectorAll('.face').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');};
      row.appendChild(b);
    });
    wrap.appendChild(row);
  }
  else if(q.type==='choice'){
    wrap.appendChild(el('p','q-label',q.label));
    const row = el('div','pills');
    q.options.forEach(opt=>{
      const b = el('button','pill',opt); b.type='button';
      if(answers[q.key]===opt) b.classList.add('sel');
      b.onclick=()=>{answers[q.key]=opt; row.querySelectorAll('.pill').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');};
      row.appendChild(b);
    });
    wrap.appendChild(row);
  }
  else if(q.type==='select'){
    const lab = el('label','field'); lab.style.marginBottom='0';
    lab.appendChild(el('span','field-label',q.label));
    const sel = el('select'); sel.innerHTML='<option value="" disabled '+(answers[q.key]?'':'selected')+'>Choisir…</option>'+
      q.options.map(o=>`<option ${answers[q.key]===o?'selected':''}>${o}</option>`).join('');
    sel.onchange=()=>answers[q.key]=sel.value;
    lab.appendChild(sel); wrap.appendChild(lab);
  }
  else if(q.type==='text' || q.type==='shorttext'){
    const lab = el('label','field'); lab.style.marginBottom='0';
    lab.appendChild(el('span','field-label',`${q.label}${q.opt?' <span class="opt">(facultatif)</span>':''}`));
    const inp = q.type==='text'? el('textarea') : el('input');
    if(q.type==='shorttext') inp.type='text';
    if(q.placeholder) inp.placeholder=q.placeholder;
    if(answers[q.key]) inp.value=answers[q.key];
    inp.oninput=()=>answers[q.key]=inp.value;
    lab.appendChild(inp); wrap.appendChild(lab);
  }
  return wrap;
}

function render(){
  const host = document.getElementById('steps');
  host.innerHTML='';
  const step = STEPS[cur];
  const s = el('div','step active');

  if(step.id==='welcome'){
    s.classList.add('center');
    s.appendChild(el('span','hero-badge','🧗 Les Cordées de la réussite'));
    s.appendChild(el('div','big','🌿'));
    s.appendChild(el('h1','Ton avis compte !'));
    s.appendChild(el('p','lead','Tu as vécu une année de Cordée avec l’Université de Guyane : rencontres, ateliers, imprimante 3D, et la semaine à Cayenne. Raconte-nous ce que tu en as pensé — c’est rapide, et il n’y a pas de mauvaise réponse.'));
  }
  else if(step.id==='thanks'){
    s.classList.add('center');
    s.appendChild(el('div','big','🎉'));
    s.appendChild(el('h1','Merci à toi !'));
    s.appendChild(el('p','lead','Tes réponses sont bien enregistrées. Grâce à toi, les prochaines Cordées seront encore meilleures. Continue de viser haut ! 🧗‍♀️'));
  }
  else {
    if(step.eyebrow) s.appendChild(el('p','eyebrow',step.eyebrow));
    s.appendChild(el('h2',null,step.title));
    if(step.lead) s.appendChild(el('p','lead',step.lead));
    if(step.hint) s.appendChild(el('p','hint',step.hint));
    step.questions.forEach(q=>s.appendChild(renderQuestion(q)));
  }
  host.appendChild(s);
  renderNav(step);
  paintRope();
  document.getElementById('survey').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderNav(step){
  const nav = document.getElementById('nav'); nav.innerHTML='';
  if(step.id==='welcome'){
    const b=el('button','btn btn-primary','Commencer →'); b.onclick=next; nav.appendChild(b);
    return;
  }
  if(step.id==='thanks'){
    const b=el('button','btn btn-ghost','Répondre à nouveau'); b.onclick=()=>{Object.keys(answers).forEach(k=>delete answers[k]);cur=0;render();};
    nav.appendChild(b); return;
  }
  const back=el('button','btn btn-ghost','← Retour'); back.onclick=prev; nav.appendChild(back);
  nav.appendChild(el('div','spacer'));
  nav.appendChild(el('span','count',`Étape ${cur} / ${contentSteps}`));
  const isLast = cur===STEPS.length-2;
  const fwd=el('button','btn btn-primary',isLast?'Envoyer mes réponses ✦':'Suivant →');
  fwd.onclick=isLast?submit:next; nav.appendChild(fwd);
}

function next(){ if(cur<STEPS.length-1){cur++;render();} }
function prev(){ if(cur>0){cur--;render();} }

/* ---------- submit ---------- */
async function submit(){
  const payload = {ts:Date.now()};
  ALL_KEYS.forEach(k=>{ if(answers[k]!==undefined && answers[k]!=='') payload[k]=answers[k]; });
  const key = 'reponse:'+payload.ts+'_'+Math.random().toString(36).slice(2,7);
  try{
    await window.storage.set(key, JSON.stringify(payload), true); // shared = visible côté enseignant
  }catch(e){ console.error('Enregistrement impossible', e); }
  cur = STEPS.length-1; render();
}

/* ---------- teacher dashboard ---------- */
async function loadAll(){
  let keys=[];
  try{ const r=await window.storage.list('reponse:', true); keys = r&&r.keys?r.keys:[]; }
  catch(e){ keys=[]; }
  const out=[];
  for(const k of keys){
    try{ const r=await window.storage.get(k,true); if(r&&r.value) out.push(JSON.parse(r.value)); }catch(e){}
  }
  return out.sort((a,b)=>b.ts-a.ts);
}

function renderDash(data){
  const host=document.getElementById('dashBody');
  if(!data.length){ host.innerHTML='<p class="empty">Aucune réponse pour le moment. Partage le questionnaire à tes élèves, puis reviens ici. 🌱</p>'; return; }
  let h = `<p class="lead" style="margin-top:0"><strong>${data.length}</strong> réponse${data.length>1?'s':''} reçue${data.length>1?'s':''}.</p>`;

  h += '<div class="block-title">Notes moyennes</div>';
  EMOJI_QS.forEach(([k,lab])=>{
    const vals = data.map(d=>d[k]).filter(v=>typeof v==='number');
    if(!vals.length) return;
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    h += `<div class="stat-row"><span class="lab">${lab}</span>
      <span class="bar"><i style="width:${(avg/5*100).toFixed(0)}%"></i></span>
      <span class="val">${avg.toFixed(1)}/5</span></div>`;
  });

  h += '<div class="block-title">Réponses par choix</div>';
  CHOICE_QS.forEach(([k,lab])=>{
    const counts={};
    data.forEach(d=>{ if(d[k]) counts[d[k]]=(counts[d[k]]||0)+1; });
    if(!Object.keys(counts).length) return;
    const chips=Object.entries(counts).map(([o,n])=>`<span class="chip">${o} · ${n}</span>`).join('');
    h += `<div class="stat-row"><span class="lab">${lab}</span><span class="dist">${chips}</span></div>`;
  });

  TEXT_QS.forEach(([k,lab])=>{
    const items=data.filter(d=>d[k]&&String(d[k]).trim());
    if(!items.length) return;
    h += `<div class="block-title">${lab}</div>`;
    items.forEach(d=>{
      const who=[d.prenom,d.classe].filter(Boolean).join(' · ')||'Anonyme';
      h += `<div class="quote">${escapeHtml(d[k])}<span class="meta">— ${escapeHtml(who)}</span></div>`;
    });
  });

  host.innerHTML=h;
}

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function toCSV(data){
  const cols=['ts',...ALL_KEYS];
  const head=['date',...ALL_KEYS].join(';');
  const rows=data.map(d=>cols.map(c=>{
    let v = c==='ts'? new Date(d.ts).toLocaleString('fr-FR') : (d[c]??'');
    v=String(v).replace(/"/g,'""'); return /[;\n"]/.test(v)?`"${v}"`:v;
  }).join(';'));
  return [head,...rows].join('\n');
}

/* ---------- wiring ---------- */
let dashData=[];
document.getElementById('teacherLink').onclick=async()=>{
  const code=prompt('Code enseignant :');
  if(code===null) return;
  if(code!==TEACHER_CODE){ alert('Code incorrect.'); return; }
  document.getElementById('survey').style.display='none';
  document.getElementById('dash').classList.add('active');
  dashData=await loadAll(); renderDash(dashData);
};
document.getElementById('reloadBtn').onclick=async()=>{ dashData=await loadAll(); renderDash(dashData); };
document.getElementById('backBtn').onclick=()=>{
  document.getElementById('dash').classList.remove('active');
  document.getElementById('survey').style.display='';
};
document.getElementById('csvBtn').onclick=()=>{
  if(!dashData.length){ alert('Aucune donnée à exporter.'); return; }
  const blob=new Blob(['\ufeff'+toCSV(dashData)],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='reponses-cordees.csv'; a.click(); URL.revokeObjectURL(a.href);
};

buildRope();
render();
</script>
